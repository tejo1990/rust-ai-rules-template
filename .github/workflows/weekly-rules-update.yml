name: Weekly Rules Update

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install anthropic google-generativeai httpx feedparser

      - name: Fetch Rust ecosystem updates
        id: fetch
        run: python .github/scripts/fetch_rust_updates.py
        env:
          OUTPUT_FILE: /tmp/rust_updates.md

      - name: Analyze and suggest rule updates
        id: analyze
        run: python .github/scripts/suggest_rule_updates.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPDATES_FILE: /tmp/rust_updates.md
          OUTPUT_FILE: /tmp/rule_suggestions.md

      - name: Check if suggestions exist
        id: check
        run: |
          if [ -s /tmp/rule_suggestions.md ]; then
            echo "has_suggestions=true" >> $GITHUB_OUTPUT
          else
            echo "has_suggestions=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request with suggestions
        if: steps.check.outputs.has_suggestions == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "rules-update/weekly-$(date +%Y-%m-%d)"
          title: "[Weekly] Rust ecosystem rules update — $(date +%Y-%m-%d)"
          body-path: /tmp/rule_suggestions.md
          commit-message: "chore: weekly rules update suggestion"
          labels: |
            rules-update
            automated
          draft: true
