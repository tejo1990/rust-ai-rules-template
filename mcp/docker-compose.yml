# Docker MCP Stack — Rust AI Development
# 
# 용도: 어떤 AI 코딩 플랫폼에서든 동일한 MCP 서버를 재사용.
# 사용법: cp mcp/.env.example mcp/.env → 편집 → docker compose -f mcp/docker-compose.yml up -d
#
# 포트 할당:
#   3001: filesystem
#   3002: git
#   3003: github
#   3004: memory (persistent)
#   3005: sequential-thinking
#   3006: fetch (web)

services:

  # ── 파일시스템 ──────────────────────────────────────────────────────────────
  mcp-filesystem:
    image: mcp/filesystem:latest
    build:
      context: ./servers/filesystem
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ${PROJECTS_ROOT:-~/projects}:/workspace:rw
    environment:
      - ALLOWED_PATHS=/workspace
    labels:
      mcp.server: "filesystem"
      mcp.transport: "http"

  # ── Git 조작 ────────────────────────────────────────────────────────────────
  mcp-git:
    image: mcp/git:latest
    build:
      context: ./servers/git
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - ${PROJECTS_ROOT:-~/projects}:/workspace:rw
      - ~/.gitconfig:/root/.gitconfig:ro
    labels:
      mcp.server: "git"
      mcp.transport: "http"

  # ── GitHub API ──────────────────────────────────────────────────────────────
  mcp-github:
    image: ghcr.io/github/github-mcp-server:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN}
    labels:
      mcp.server: "github"
      mcp.transport: "http"

  # ── Persistent Memory ───────────────────────────────────────────────────────
  # 프로젝트 컨텍스트, 아키텍처 결정사항 등을 세션 간 유지
  mcp-memory:
    image: mcp/memory:latest
    build:
      context: ./servers/memory
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3004"
    volumes:
      - mcp_memory_data:/data
    labels:
      mcp.server: "memory"
      mcp.transport: "http"

  # ── Sequential Thinking ─────────────────────────────────────────────────────
  # 복잡한 멀티스텝 계획 수립 (Antigravity Plan Mode와 시너지)
  mcp-sequential-thinking:
    image: mcp/sequential-thinking:latest
    build:
      context: ./servers/sequential-thinking
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:3005"
    labels:
      mcp.server: "sequential-thinking"
      mcp.transport: "http"

  # ── Web Fetch ───────────────────────────────────────────────────────────────
  # 문서, crates.io, RFC 페이지 등 fetch
  mcp-fetch:
    image: mcp/fetch:latest
    build:
      context: ./servers/fetch
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3006:3006"
    labels:
      mcp.server: "fetch"
      mcp.transport: "http"

volumes:
  mcp_memory_data:
    driver: local

networks:
  default:
    name: mcp_network
